name: Compatibility

on:
  push:
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        laravel: [11, 12, 13]

    steps:
      - uses: actions/checkout@v4

      - name: Validate composer.json
        run: docker run --rm -v "$PWD":/app -w /app composer:2 composer validate

      - name: Start Tarantool
        run: docker compose up -d tarantool

      - name: Run Laravel ${{ matrix.laravel }} integration tests
        run: docker compose run --rm php sh bin/test-laravel ${{ matrix.laravel }}
